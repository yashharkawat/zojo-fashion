services:
  - type: web
    name: zojo-fashion-api
    runtime: node
    region: singapore
    rootDir: apps/api
    plan: starter
    buildCommand: npm install --include=dev && npx prisma generate --schema=../../prisma/schema.prisma && npm run build
    startCommand: npm start
    healthCheckPath: /health
    numInstances: 1
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      # ─── Database (Neon / Supabase) ──────────────────
      - key: DATABASE_URL
        sync: false  # Pooled connection string
      # ─── CORS ─────────────────────────────────────────
      - key: CORS_ALLOWED_ORIGINS
        value: https://zojofashion.com,https://www.zojofashion.com
      # ─── Auth ──────────────────────────────────────────
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL_SECONDS
        value: "900"
      - key: JWT_REFRESH_TTL_SECONDS
        value: "604800"
      - key: COOKIE_DOMAIN
        value: .zojofashion.com
      - key: COOKIE_SECURE
        value: "true"
      # ─── Server ────────────────────────────────────────
      - key: PORT
        value: "4000"
      - key: API_BASE_URL
        value: https://api.zojofashion.com
      - key: LOG_LEVEL
        value: info
      # ─── Razorpay ──────────────────────────────────────
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      # ─── Notifications (optional — stubs when absent) ──
      - key: RESEND_API_KEY
        sync: false
      - key: MSG91_AUTH_KEY
        sync: false
