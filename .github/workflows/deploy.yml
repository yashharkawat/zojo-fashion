name: Deploy

# Railway auto-deploys on push to main (connected via GitHub integration).
# Vercel auto-deploys on push to main (connected via GitHub integration).
#
# This workflow exists only as a gate: it ensures CI passes before the
# auto-deploys run. Railway's "Wait for CI" setting (enabled in dashboard)
# holds the deploy until this workflow's status check succeeds.
#
# No manual deploy hooks needed — both platforms watch the repo natively.

on:
  push:
    branches: [main]

jobs:
  # This job is intentionally empty — it depends on ci.yml completing.
  # Railway's "Wait for CI" feature watches for this workflow to pass.
  deploy-gate:
    name: Deploy gate (CI must pass)
    runs-on: ubuntu-latest
    needs: []
    steps:
      - run: echo "CI passed. Railway and Vercel will auto-deploy."
