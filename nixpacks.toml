# Railway/Nixpacks config for monorepo
# Let Nixpacks auto-detect Node version. All commands run from apps/api.

[phases.install]
cmds = ["cd apps/api && npm ci --include=dev"]

[phases.build]
cmds = ["cd apps/api && npx prisma generate --schema=../../prisma/schema.prisma && npm run build"]

[start]
cmd = "cd apps/api && node dist/server.js"
